<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anup Bajgain | Coming Soon</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
height:100vh;
font-family:'Orbitron',sans-serif;
background:linear-gradient(-45deg,#041321,#0b2745,#09203a,#000814);
background-size:400% 400%;
animation:sky 18s ease infinite;
color:white;
}

/* Animated Sky */

@keyframes sky{
0%{background-position:0 50%;}
50%{background-position:100% 50%;}
100%{background-position:0 50%;}
}

/* Stars */

.stars{
position:absolute;
width:100%;
height:100%;
overflow:hidden;
}

.star{
position:absolute;
background:white;
border-radius:50%;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:.2;}
to{opacity:1;}
}

/* Clouds */

.cloud{
position:absolute;
font-size:90px;
opacity:.12;
animation:clouds linear infinite;
}

.cloud:nth-child(1){
top:10%;
left:-200px;
animation-duration:40s;
}

.cloud:nth-child(2){
top:60%;
left:-300px;
animation-duration:60s;
}

@keyframes clouds{

to{
transform:translateX(160vw);
}

}

/* Plane */

.plane{
position:absolute;
top:28%;
left:-180px;
font-size:70px;
animation:fly 10s linear infinite;
filter:drop-shadow(0 0 20px cyan);
}

@keyframes fly{

0%{
transform:translate(-200px,50px) rotate(-8deg);
}

20%{
transform:translate(25vw,-20px) rotate(2deg);
}

45%{
transform:translate(55vw,15px) rotate(-2deg);
}

70%{
transform:translate(80vw,-30px) rotate(3deg);
}

100%{
transform:translate(120vw,-80px) rotate(-8deg);
}

}

/* Contrail */

.plane::after{

content:"";
position:absolute;
top:48%;
right:100%;
width:400px;
height:4px;

background:linear-gradient(to left,
rgba(255,255,255,.8),
transparent);

}

/* Radar */

.radar{

position:absolute;
width:350px;
height:350px;
border:2px solid rgba(0,255,255,.2);
border-radius:50%;
bottom:-140px;
right:-140px;

}

.radar::before{

content:"";
position:absolute;
left:50%;
top:50%;

width:2px;
height:175px;

background:cyan;

transform-origin:bottom center;

animation:scan 4s linear infinite;

box-shadow:0 0 30px cyan;

}

@keyframes scan{

to{

transform:rotate(360deg);

}

}

/* Card */

.card{

position:absolute;

top:50%;
left:50%;

transform:translate(-50%,-50%);

padding:50px;

width:min(90%,700px);

text-align:center;

background:rgba(255,255,255,.08);

backdrop-filter:blur(15px);

border:1px solid rgba(255,255,255,.15);

border-radius:25px;

box-shadow:0 0 40px rgba(0,255,255,.15);

animation:appear 2s;

}

@keyframes appear{

from{

opacity:0;
transform:translate(-50%,-40%);

}

to{

opacity:1;
transform:translate(-50%,-50%);

}

}

h1{

font-size:clamp(2rem,6vw,4rem);

letter-spacing:4px;

margin-bottom:20px;

}

h2{

color:#6be8ff;

font-size:1.2rem;

margin-bottom:30px;

}

p{

font-family:Arial;

line-height:1.8;

color:#d7e6ef;

}

/* Loading */

.loading{

margin-top:35px;

width:100%;
height:10px;

border-radius:30px;

background:#1c2e44;

overflow:hidden;

}

.loading span{

display:block;

height:100%;

background:linear-gradient(90deg,#00eaff,#6cffc5);

animation:load 5s infinite;

}

@keyframes load{

0%{width:0;}

80%{width:100%;}

100%{width:100%;}

}

/* Floating particles */

.particle{

position:absolute;

width:4px;
height:4px;

background:#6cf;

border-radius:50%;

opacity:.4;

animation:float 15s linear infinite;

}

@keyframes float{

from{

transform:translateY(100vh);

}

to{

transform:translateY(-120vh);

}

}

footer{

margin-top:35px;

font-size:12px;

opacity:.7;

font-family:Arial;

}

</style>

</head>

<body>

<div class="stars"></div>

<div class="cloud">☁</div>
<div class="cloud">☁</div>

<div class="plane">✈</div>

<div class="radar"></div>

<div class="card">

<h1>Hello There.</h1>

<h2>Portfolio Under Construction</h2>

<p>
<br><br>

Prepare for takeoff.

</p>

<div class="loading">

<span></span>

</div>

<footer>

© 2026 Anup Bajgain

</footer>

</div>

<script>

/* Stars */

const stars=document.querySelector(".stars");

for(let i=0;i<180;i++){

let s=document.createElement("div");

s.className="star";

let size=Math.random()*3+1;

s.style.width=size+"px";

s.style.height=size+"px";

s.style.left=Math.random()*100+"%";

s.style.top=Math.random()*100+"%";

s.style.animationDuration=(1+Math.random()*3)+"s";

stars.appendChild(s);

}

/* Particles */

for(let i=0;i<40;i++){

let p=document.createElement("div");

p.className="particle";

p.style.left=Math.random()*100+"vw";

p.style.animationDuration=(8+Math.random()*10)+"s";

p.style.animationDelay=Math.random()*8+"s";

document.body.appendChild(p);

}

</script>

</body>
</html>
