<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            overflow:hidden;
            background:linear-gradient(180deg,#071425,#0b2742,#123c63);
            color:white;
        }

        /* Stars */
        body::before{
            content:"";
            position:absolute;
            inset:0;
            background-image:
                radial-gradient(white 1px, transparent 1px);
            background-size:45px 45px;
            opacity:.18;
        }

        .container{
            text-align:center;
            z-index:2;
            padding:2rem;
        }

        h1{
            font-size:3rem;
            margin-bottom:1rem;
            letter-spacing:2px;
        }

        p{
            font-size:1.2rem;
            color:#c7d8e8;
        }

        /* Airplane */
        .plane{
            position:absolute;
            font-size:2.2rem;
            top:35%;
            left:-60px;
            animation:fly 12s linear infinite;
        }

        .trail{
            position:absolute;
            top:50%;
            left:0;
            width:100%;
            height:2px;
            background:linear-gradient(to right,
                transparent,
                rgba(255,255,255,.25),
                transparent);
            animation:moveTrail 4s linear infinite;
        }

        @keyframes fly{
            0%{
                transform:translateX(0) translateY(40px) rotate(-5deg);
            }
            25%{
                transform:translateX(30vw) translateY(-20px) rotate(3deg);
            }
            50%{
                transform:translateX(60vw) translateY(15px) rotate(-2deg);
            }
            75%{
                transform:translateX(85vw) translateY(-15px) rotate(4deg);
            }
            100%{
                transform:translateX(110vw) translateY(30px) rotate(-4deg);
            }
        }

        @keyframes moveTrail{
            from{transform:translateX(-100%);}
            to{transform:translateX(100%);}
        }

        .accent{
            color:#66d9ff;
        }

        @media(max-width:600px){
            h1{
                font-size:2.2rem;
            }

            p{
                font-size:1rem;
            }
        }
    </style>
</head>

<body>

<div class="trail"></div>

<div class="plane">✈</div>

<div class="container">
    <h1>Hello There 👋</h1>
    <p>My portfolio is currently under construction.</p>
    <p style="margin-top:10px;">
        <span class="accent">Website Coming Soon...</span>
    </p>
</div>

</body>
</html>
